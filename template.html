<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — AI Intelligence Briefing</title>
<meta name="description" content="{{DEK}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F5F0; --panel:#FCFCFA; --ink:#15171B; --ink-soft:#4A4E57;
    --line:#D9DAD2; --wire:#1E33D9; --alert:#D63A22; --research:#0B7A5F;
    --policy:#8A5A00; --radius:14px; --maxw:880px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--paper);color:var(--ink);font-family:'Source Serif 4',Georgia,serif;
       font-size:17px;line-height:1.65;-webkit-font-smoothing:antialiased}
  .mono{font-family:'IBM Plex Mono',monospace}

  .ticker{background:var(--ink);color:var(--paper);overflow:hidden;white-space:nowrap;
    font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.04em;
    padding:9px 0;border-bottom:3px solid var(--wire)}
  .ticker__track{display:inline-block;animation:wire 42s linear infinite;padding-left:100%}
  .ticker__track span{margin-right:56px}
  .ticker__track b{color:#8FA0FF;font-weight:600}
  @keyframes wire{to{transform:translateX(-100%)}}
  @media (prefers-reduced-motion: reduce){
    .ticker__track{animation:none;padding-left:16px;white-space:normal}
  }

  header{max-width:var(--maxw);margin:0 auto;padding:56px 24px 28px}
  .issue-line{display:flex;justify-content:space-between;align-items:baseline;
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--line);
    padding-bottom:12px;margin-bottom:22px;flex-wrap:wrap;gap:8px}
  .issue-line b{color:var(--wire)}
  h1.masthead{font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 118;
    font-weight:900;font-size:clamp(52px,9.5vw,104px);line-height:.92;
    letter-spacing:-.02em;text-transform:uppercase}
  h1.masthead em{font-style:normal;color:transparent;-webkit-text-stroke:2px var(--ink)}
  .dek{margin-top:18px;max-width:560px;font-size:19px;color:var(--ink-soft)}

  nav.filters{max-width:var(--maxw);margin:26px auto 0;padding:0 24px;
    display:flex;gap:10px;flex-wrap:wrap}
  .chip{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border-radius:100px;
    border:1.5px solid var(--line);background:var(--panel);color:var(--ink-soft);
    cursor:pointer;transition:all .15s ease}
  .chip:hover{border-color:var(--ink)}
  .chip:focus-visible{outline:2px solid var(--wire);outline-offset:2px}
  .chip.active{background:var(--ink);border-color:var(--ink);color:var(--paper)}

  main{max-width:var(--maxw);margin:34px auto 0;padding:0 24px}
  article.story{background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);padding:28px 30px;margin-bottom:18px;
    transition:transform .15s ease, box-shadow .15s ease}
  article.story:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(21,23,27,.07)}
  article.story.lead{padding:38px 34px;border-left:6px solid var(--wire)}
  article.story.lead h2{font-size:clamp(26px,4vw,36px)}
  article.story.hidden{display:none}
  .story-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.1em;
    text-transform:uppercase;margin-bottom:12px}
  .tag{padding:3px 10px;border-radius:5px;font-weight:600;color:#fff}
  .tag.launch{background:var(--wire)} .tag.alert{background:var(--alert)}
  .tag.research{background:var(--research)} .tag.policy{background:var(--policy)}
  .stamp{color:var(--ink-soft)}
  article.story h2{font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 105;
    font-weight:800;font-size:22px;line-height:1.18;letter-spacing:-.01em;margin-bottom:10px}
  article.story h2 a{color:inherit;text-decoration:none}
  article.story h2 a:hover{color:var(--wire)}
  article.story p{color:var(--ink-soft);font-size:16.5px}
  .readmore{display:inline-block;margin-top:14px;font-family:'IBM Plex Mono',monospace;
    font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    color:var(--wire);text-decoration:none;border-bottom:2px solid var(--wire);padding-bottom:2px}
  .readmore:hover{color:var(--ink);border-color:var(--ink)}

  section.quickhits{max-width:var(--maxw);margin:46px auto 0;padding:0 24px}
  .section-label{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;
    letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);
    display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--line)}
  ul.hits{list-style:none}
  ul.hits li{display:flex;gap:16px;align-items:baseline;padding:13px 4px;
    border-bottom:1px dashed var(--line);font-size:16px}
  ul.hits .stamp{flex-shrink:0;font-size:11.5px}
  ul.hits a{color:var(--ink);text-decoration:none}
  ul.hits a:hover{color:var(--wire)}

  footer{max-width:var(--maxw);margin:54px auto 0;padding:26px 24px 60px;
    border-top:1px solid var(--line);display:flex;justify-content:space-between;
    gap:16px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:12px;
    letter-spacing:.06em;color:var(--ink-soft)}
  footer a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}
  footer a:hover{color:var(--wire);border-color:var(--wire)}

  @media (max-width:560px){
    article.story{padding:22px 20px}
    article.story.lead{padding:26px 22px}
  }
</style>
</head>
<body>

<div class="ticker" aria-label="Latest headlines ticker">
  <div class="ticker__track">{{TICKER}}</div>
</div>

<header>
  <div class="issue-line">
    <span>Issue <b>{{ISSUE_NO}}</b></span>
    <span>{{ISSUE_DATE}}</span>
    <span>{{LOCATION}}</span>
  </div>
  <h1 class="masthead">The <em>Wire</em></h1>
  <p class="dek">{{DEK}}</p>
</header>

<nav class="filters" aria-label="Filter stories by category">
  <button class="chip active" data-filter="all">All</button>
  <button class="chip" data-filter="launch">Launches</button>
  <button class="chip" data-filter="alert">Alerts</button>
  <button class="chip" data-filter="research">Research</button>
  <button class="chip" data-filter="policy">Policy</button>
</nav>

<main id="feed">{{STORIES}}
</main>

<section class="quickhits">
  <div class="section-label">Quick hits</div>
  <ul class="hits">{{QUICK_HITS}}
  </ul>
</section>

<footer>
  <span>© 2026 {{TITLE}} — auto-compiled, human-owned</span>
  <span class="mono">last build: {{BUILT_AT}}</span>
</footer>

<script>
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    const f = chip.dataset.filter;
    document.querySelectorAll('article.story').forEach(a => {
      a.classList.toggle('hidden', f !== 'all' && a.dataset.tag !== f);
    });
  });
});
</script>
</body>
</html>
